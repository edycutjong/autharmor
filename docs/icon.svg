<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#06b6d4" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#020617" />
  <circle cx="256" cy="256" r="240" fill="url(#innerGlow)" />

  <!-- Shield body -->
  <path d="M256 56 L420 140 L420 280 C420 380 340 440 256 468 C172 440 92 380 92 280 L92 140 Z"
        fill="url(#shieldGrad)" filter="url(#softShadow)" />

  <!-- Shield inner highlight -->
  <path d="M256 80 L400 155 L400 278 C400 368 328 422 256 448 C184 422 112 368 112 278 L112 155 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

  <!-- Lock keyhole body -->
  <circle cx="256" cy="255" r="40" fill="url(#crossGrad)" filter="url(#glow)" />
  
  <!-- Lock keyhole slot -->
  <path d="M256 265 L244 310 L268 310 Z" fill="url(#crossGrad)" filter="url(#glow)" />

  <!-- Citation brackets - left -->
  <path d="M170 200 L150 200 L150 320 L170 320" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Citation brackets - right -->
  <path d="M342 200 L362 200 L362 320 L342 320" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round" />

  <!-- Data dots representing FHIR citations -->
  <circle cx="200" cy="340" r="5" fill="#22d3ee" opacity="0.7" />
  <circle cx="220" cy="355" r="4" fill="#10b981" opacity="0.6" />
  <circle cx="256" cy="365" r="6" fill="#22d3ee" opacity="0.8" />
  <circle cx="292" cy="355" r="4" fill="#10b981" opacity="0.6" />
  <circle cx="312" cy="340" r="5" fill="#22d3ee" opacity="0.7" />
</svg>
